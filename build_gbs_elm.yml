name: build-gbs-elm

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: xmake-io/github-action-setup-xmake@v1

      - name: Install pybind11
        run: python -m pip install --upgrade pip pybind11

      - name: Export include paths
        shell: bash
        run: |
          echo "PYBIND11_INCLUDE=$(python - <<'PY'\nimport pybind11; print(pybind11.get_include())\nPY)" >> $GITHUB_ENV
          echo "PYTHON_INCLUDE=$(python - <<'PY'\nimport sysconfig; print(sysconfig.get_paths()['include'])\nPY)" >> $GITHUB_ENV

      - name: Build
        shell: bash
        run: |
          cd recognition/GBS_ELM
          # 如果 macOS 上 OpenMP 报错可改成: --with_openmp=n
          xmake f -c -m release
          xmake

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gbs-elm-${{ matrix.os }}-py${{ matrix.python }}
          path: |
            recognition/GBS_ELM/build/**/fancyIndex4py.*
            recognition/GBS_ELM/build/**/fancyIndex*
