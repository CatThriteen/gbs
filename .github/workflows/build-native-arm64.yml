name: Build Linux ARM64 native binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-native-arm64.yml"
      - "gbs_elm_runtime/**"
      - "src/**"
      - "tools/**"
      - "xmake.lua"
  pull_request:
    paths:
      - ".github/workflows/build-native-arm64.yml"
      - "gbs_elm_runtime/**"
      - "src/**"
      - "tools/**"
      - "xmake.lua"

permissions:
  contents: read

jobs:
  build-linux-arm64:
    name: Linux ARM64 / Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            py-tag: "310"
          - python-version: "3.11"
            py-tag: "311"
          - python-version: "3.12"
            py-tag: "312"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libeigen3-dev libgomp1 pybind11-dev

      - name: Export native include paths
        run: |
          {
            echo "EIGEN3_INCLUDE=/usr/include/eigen3"
            echo "PYBIND11_INCLUDE=/usr/include"
            python -c "import sysconfig; print('PYTHON_INCLUDE=' + sysconfig.get_path('include'))"
          } >> "$GITHUB_ENV"

      - name: Build native targets
        run: |
          xmake f -m release --plat=linux --arch=arm64 --use_system_deps=true -y
          xmake build -y fancyIndex fancyIndex4py

      - name: Collect prebuilt files
        run: |
          python tools/collect_native.py \
            --src build \
            --dst prebuilt \
            --os linux \
            --arch arm64 \
            --py "${{ matrix.py-tag }}"

      - name: Smoke test packaged extension
        env:
          GBS_ELM_PREBUILT_ROOT: ${{ github.workspace }}/prebuilt
        run: python run.py

      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-linux-arm64-cp${{ matrix.py-tag }}
          path: prebuilt/linux-arm64/cp${{ matrix.py-tag }}/
