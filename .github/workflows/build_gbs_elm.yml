name: build-gbs-elm

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: xmake-io/github-action-setup-xmake@v1

      - name: Install pybind11
        run: python -m pip install --upgrade pip pybind11

      - name: Export include paths
        shell: bash
        run: |
          echo "PYBIND11_INCLUDE=$(python -c 'import pybind11;print(pybind11.get_include())')" >> $GITHUB_ENV
          echo "PYTHON_INCLUDE=$(python -c 'import sysconfig;print(sysconfig.get_paths()[\"include\"])')" >> $GITHUB_ENV

      - name: Show repo tree (debug)
        shell: bash
        run: |
          pwd
          ls -la
          ls -la recognition || true
          ls -la recognition/GBS_ELM || true

      - name: Build (Linux/Windows)
        if: matrix.os != 'macos-latest'
        shell: bash
        working-directory: GBS_ELM
        run: |
          xmake f -c -m release
          xmake

      - name: Build (macOS, no OpenMP)
        if: matrix.os == 'macos-latest'
        shell: bash
        working-directory: GBS_ELM
        run: |
          xmake f -c -m release --with_openmp=n
          xmake

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gbs-elm-${{ matrix.os }}-py${{ matrix.python }}
          path: |
            GBS_ELM/build/**/fancyIndex4py.*
            GBS_ELM/build/**/fancyIndex*
