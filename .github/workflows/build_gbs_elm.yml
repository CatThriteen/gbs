name: build-gbs-elm

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: "3.0.6"

      - name: Update xmake-repo
        shell: bash
        run: xmake repo --update

      - name: Install pybind11
        run: python -m pip install --upgrade pip pybind11

      - name: Export include paths
        shell: bash
        run: |
          PYBIND11_INCLUDE=$(python -c 'import pybind11;print(pybind11.get_include())')
          PYTHON_INCLUDE=$(python -c 'import sysconfig;print(sysconfig.get_paths()["include"])')
          echo "PYBIND11_INCLUDE=$PYBIND11_INCLUDE" >> "$GITHUB_ENV"
          echo "PYTHON_INCLUDE=$PYTHON_INCLUDE" >> "$GITHUB_ENV"

      - name: Export Python lib (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "PYTHON_LIBDIR=$pythonLocation/libs" >> "$GITHUB_ENV"
          PYLIB=$(python -c "import sys;print(f'python{sys.version_info[0]}{sys.version_info[1]}')")
          echo "PYTHON_LIBNAME=$PYLIB" >> "$GITHUB_ENV"

      - name: Locate xmake.lua
        shell: bash
        run: |
          XMAKE_DIR=$(dirname "$(find . -maxdepth 6 -name xmake.lua -print -quit)")
          if [ -z "$XMAKE_DIR" ]; then
            echo "xmake.lua not found"; exit 1
          fi
          echo "XMAKE_DIR=$XMAKE_DIR" >> "$GITHUB_ENV"

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        working-directory: ${{ env.XMAKE_DIR }}
        run: |
          rm -rf .xmake build
          xmake f -y -m release
          xmake -y

      - name: Build (macOS, no OpenMP)
        if: matrix.os == 'macos-latest'
        shell: bash
        working-directory: ${{ env.XMAKE_DIR }}
        run: |
          rm -rf .xmake build
          xmake f -y -m release --with_openmp=n
          xmake -y

      - name: Build (Windows, MSVC)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: ${{ env.XMAKE_DIR }}
        run: |
          Remove-Item -Recurse -Force .xmake, build -ErrorAction SilentlyContinue
          xmake f -y -m release --toolchain=msvc
          xmake -y

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gbs-elm-${{ matrix.os }}-py${{ matrix.python }}
          path: |
            ${{ env.XMAKE_DIR }}/build/**/fancyIndex4py.*
            ${{ env.XMAKE_DIR }}/build/**/fancyIndex*
