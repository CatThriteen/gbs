name: build-gbs-elm

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-macos-windows:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python: ["3.10", "3.11","3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: "3.0.6"

      - name: Update xmake-repo
        shell: bash
        run: xmake repo --update

      - name: Install pybind11
        shell: bash
        run: python -m pip install --upgrade pip pybind11

      - name: Export include paths
        shell: bash
        run: |
          PYBIND11_INCLUDE=$(python -c 'import pybind11;print(pybind11.get_include())')
          PYTHON_INCLUDE=$(python -c 'import sysconfig;print(sysconfig.get_paths()["include"])')
          echo "PYBIND11_INCLUDE=$PYBIND11_INCLUDE" >> "$GITHUB_ENV"
          echo "PYTHON_INCLUDE=$PYTHON_INCLUDE" >> "$GITHUB_ENV"

      - name: Export Python lib (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "PYTHON_LIBDIR=$pythonLocation/libs" >> "$GITHUB_ENV"
          PYLIB=$(python -c "import sys;print(f'python{sys.version_info[0]}{sys.version_info[1]}')")
          echo "PYTHON_LIBNAME=$PYLIB" >> "$GITHUB_ENV"

      - name: Locate xmake.lua
        shell: bash
        run: |
          XMAKE_DIR=$(dirname "$(find . -maxdepth 6 -name xmake.lua -print -quit)")
          if [ -z "$XMAKE_DIR" ]; then
            echo "xmake.lua not found"; exit 1
          fi
          echo "XMAKE_DIR=$XMAKE_DIR" >> "$GITHUB_ENV"

      - name: Build (macOS, no OpenMP)
        if: matrix.os == 'macos-latest'
        shell: bash
        working-directory: ${{ env.XMAKE_DIR }}
        run: |
          rm -rf .xmake build
          xmake f -y -m release --with_openmp=n
          xmake -y

      - name: Build (Windows, MSVC)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: ${{ env.XMAKE_DIR }}
        run: |
          Remove-Item -Recurse -Force .xmake, build -ErrorAction SilentlyContinue
          xmake f -y -m release --toolchain=msvc
          xmake -y

      # 2) 收集到 prebuilt/ 结构
      - name: Collect native to prebuilt/
        shell: bash
        run: |
          OS=$(python -c "import sys; print('windows' if sys.platform.startswith('win') else 'macos' if sys.platform=='darwin' else 'linux')")
          ARCH=$(python -c "import platform; m=platform.machine().lower(); print('x86_64' if m in ('x86_64','amd64') else m)")
          PY=$(python -c "import sys; print(f'{sys.version_info[0]}{sys.version_info[1]}')")
          python tools/collect_native.py --src "${{ env.XMAKE_DIR }}/build" --dst "${GITHUB_WORKSPACE}/prebuilt" --os "$OS" --arch "$ARCH" --py "$PY"

      # 1) 运行时验收：用 loader 做 import smoke
      - name: Smoke test (import via loader)
        shell: bash
        run: |
          python run.py

      # 上传的应是 prebuilt/**（而不是 build/**）
      - name: Upload artifacts (prebuilt)
        uses: actions/upload-artifact@v4
        with:
          name: gbs-elm-${{ matrix.os }}-py${{ matrix.python }}
          if-no-files-found: error
          path: |
            prebuilt/**

  build-linux-manylinux:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Locate xmake.lua
        shell: bash
        run: |
          XMAKE_DIR=$(dirname "$(find . -maxdepth 6 -name xmake.lua -print -quit)")
          if [ -z "$XMAKE_DIR" ]; then echo "xmake.lua not found"; exit 1; fi
          echo "XMAKE_DIR=$XMAKE_DIR" >> "$GITHUB_ENV"

      - name: Build in manylinux2014 via docker
        shell: bash
        run: |
          set -eux
          case "${{ matrix.python }}" in
            3.10) PYBIN=cp310-cp310; PY=310 ;;
            3.11) PYBIN=cp311-cp311; PY=311 ;;
            3.12) PYBIN=cp312-cp312; PY=312 ;;
            *) exit 1 ;;
          esac

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp/home \
            -v "$GITHUB_WORKSPACE":/work -w /work \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -lc "
              set -eux
              mkdir -p \$HOME
              export PATH=/opt/python/${PYBIN}/bin:\$PATH
              python -V

              python -m pip install -U pip pybind11
              curl -fsSL https://xmake.io/shget.text | bash
              export PATH=\$HOME/.local/bin:\$PATH

              # 关键：把正确的 python/pybind include 导出给 xmake，避免它去装 Python 3.13
              PYBIND11_INCLUDE=\$(python -c 'import pybind11;print(pybind11.get_include())')
              PYTHON_INCLUDE=\$(python -c 'import sysconfig;print(sysconfig.get_paths()[\"include\"])')
              export PYBIND11_INCLUDE PYTHON_INCLUDE

              rm -rf /tmp/src
              mkdir -p /tmp/src
              cp -a /work/. /tmp/src/

              cd /tmp/src/${{ env.XMAKE_DIR }}
              rm -rf .xmake build

              # repo update 可留可不留，但会更慢；先留着也行
              xmake repo --update

              xmake f -y -m release --use_system_deps=y
              xmake -y

              python /work/tools/collect_native.py \
                --src \"/tmp/src/${{ env.XMAKE_DIR }}/build\" \
                --dst \"/work/prebuilt\" \
                --os linux --arch x86_64 --py \"${PY}\"
            "

      - name: Smoke test
        shell: bash
        run: python run.py

      - name: Upload artifacts (prebuilt)
        uses: actions/upload-artifact@v4
        with:
          name: gbs-elm-linux-manylinux-py${{ matrix.python }}
          if-no-files-found: error
          path: prebuilt/**


      - name: Smoke test
        shell: bash
        run: python run.py

      - name: Upload artifacts (prebuilt)
        uses: actions/upload-artifact@v4
        with:
          name: gbs-elm-linux-manylinux-py${{ matrix.py }}
          if-no-files-found: error
          path: prebuilt/**


  assemble:
    needs: [build-macos-windows, build-linux-manylinux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Merge prebuilt/
        shell: bash
        run: |
          rm -rf prebuilt
          mkdir -p prebuilt
          for d in _artifacts/*; do
            if [ -d "$d/prebuilt" ]; then
              rsync -a "$d/prebuilt/" prebuilt/
            fi
          done
          echo "Merged prebuilt tree:"
          find prebuilt -maxdepth 4 -type f -print

      # 4) 组装成最终可交付 zip（排除 build/.xmake 等）
      - name: Create bundle zip
        shell: bash
        run: |
          rm -rf _bundle
          mkdir -p _bundle
          rsync -a . _bundle/ \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".vscode/" \
            --exclude "build/" \
            --exclude ".xmake/" \
            --exclude "**/.deps/" \
            --exclude "**/.objs/" \
            --exclude "**/.build_cache/" \
            --exclude "_artifacts/" \
            --exclude "_bundle/"
          cd _bundle
          zip -r ../GBS_ELM_bundle.zip .

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: GBS_ELM_bundle
          if-no-files-found: error
          path: GBS_ELM_bundle.zip
