name: build-gbs-elm

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-macos-windows:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: "3.0.6"

      - name: Update xmake-repo (best effort)
        shell: bash
        run: xmake repo --update || true

      - name: Install pybind11
        shell: bash
        run: python -m pip install --upgrade pip pybind11

      - name: Export include paths
        shell: bash
        run: |
          PYBIND11_INCLUDE=$(python -c 'import pybind11;print(pybind11.get_include())')
          PYTHON_INCLUDE=$(python -c 'import sysconfig;print(sysconfig.get_paths()["include"])')
          echo "PYBIND11_INCLUDE=$PYBIND11_INCLUDE" >> "$GITHUB_ENV"
          echo "PYTHON_INCLUDE=$PYTHON_INCLUDE" >> "$GITHUB_ENV"

      - name: Export Python lib (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "PYTHON_LIBDIR=$pythonLocation/libs" >> "$GITHUB_ENV"
          PYLIB=$(python -c "import sys;print(f'python{sys.version_info[0]}{sys.version_info[1]}')")
          echo "PYTHON_LIBNAME=$PYLIB" >> "$GITHUB_ENV"

      - name: Locate xmake.lua
        shell: bash
        run: |
          XMAKE_DIR=$(dirname "$(find . -maxdepth 6 -name xmake.lua -print -quit)")
          if [ -z "$XMAKE_DIR" ]; then
            echo "xmake.lua not found"; exit 1
          fi
          echo "XMAKE_DIR=$XMAKE_DIR" >> "$GITHUB_ENV"

      - name: Build (macOS, no OpenMP)
        if: matrix.os == 'macos-latest'
        shell: bash
        working-directory: ${{ env.XMAKE_DIR }}
        run: |
          rm -rf .xmake build
          xmake f -y -m release --with_openmp=n
          xmake -y

      - name: Build (Windows, MSVC)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: ${{ env.XMAKE_DIR }}
        run: |
          Remove-Item -Recurse -Force .xmake, build -ErrorAction SilentlyContinue
          xmake f -y -m release --toolchain=msvc
          xmake -y

      - name: Collect native to prebuilt/
        shell: bash
        run: |
          set -eux
          rm -rf prebuilt
          OS=$(python -c "import sys; print('windows' if sys.platform.startswith('win') else 'macos' if sys.platform=='darwin' else 'linux')")
          ARCH=$(python -c "import platform; m=platform.machine().lower(); print('x86_64' if m in ('x86_64','amd64') else 'arm64' if m in ('arm64','aarch64') else m)")
          PY=$(python -c "import sys; print(f'{sys.version_info[0]}{sys.version_info[1]}')")
          python tools/collect_native.py \
            --src "${{ env.XMAKE_DIR }}/build" \
            --dst "${GITHUB_WORKSPACE}/prebuilt" \
            --os "$OS" --arch "$ARCH" --py "$PY"

      - name: Show prebuilt tree
        shell: bash
        run: |
          echo "=== prebuilt files ==="
          find prebuilt -maxdepth 6 -type f -print || true

      - name: Smoke test (import via loader)
        shell: bash
        run: python run.py

      - name: Upload artifacts (prebuilt)
        uses: actions/upload-artifact@v4
        with:
          name: gbs-elm-${{ matrix.os }}-py${{ matrix.python }}
          if-no-files-found: error
          overwrite: true
          # 关键：上传目录 prebuilt（不要用 prebuilt/**）
          path: prebuilt

  build-linux-manylinux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.10"
            py: "310"
            pybin: "cp310-cp310"
          - python: "3.11"
            py: "311"
            pybin: "cp311-cp311"
          - python: "3.12"
            py: "312"
            pybin: "cp312-cp312"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Locate xmake.lua
        shell: bash
        run: |
          XMAKE_DIR=$(dirname "$(find . -maxdepth 6 -name xmake.lua -print -quit)")
          if [ -z "$XMAKE_DIR" ]; then echo "xmake.lua not found"; exit 1; fi
          echo "XMAKE_DIR=$XMAKE_DIR" >> "$GITHUB_ENV"

      - name: Build in manylinux2014 via docker
        shell: bash
        run: |
          set -eux
          rm -rf prebuilt
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp/home \
            -v "$GITHUB_WORKSPACE":/work -w /work \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -lc "
              set -eux
              mkdir -p \$HOME
              export PATH=/opt/python/${{ matrix.pybin }}/bin:\$PATH
              python -V

              python -m pip install -U pip pybind11
              curl -fsSL https://xmake.io/shget.text | bash
              export PATH=\$HOME/.local/bin:\$PATH

              PYBIND11_INCLUDE=\$(python -c 'import pybind11;print(pybind11.get_include())')
              PYTHON_INCLUDE=\$(python -c 'import sysconfig;print(sysconfig.get_paths()[\"include\"])')
              export PYBIND11_INCLUDE PYTHON_INCLUDE

              rm -rf /tmp/src
              mkdir -p /tmp/src
              cp -a /work/. /tmp/src/

              cd /tmp/src/${{ env.XMAKE_DIR }}
              rm -rf .xmake build

              # 网络抖动时不致命（只影响下载速度/偶发失败）
              xmake repo --update || true
              xmake f -y -m release
              xmake -y

              python /work/tools/collect_native.py \
                --src \"/tmp/src/${{ env.XMAKE_DIR }}/build\" \
                --dst \"/work/prebuilt\" \
                --os linux --arch x86_64 --py \"${{ matrix.py }}\"
            "

      - name: Show prebuilt tree
        shell: bash
        run: |
          echo "=== prebuilt files ==="
          find prebuilt -maxdepth 6 -type f -print || true

      - name: Smoke test
        shell: bash
        run: python run.py

      - name: Upload artifacts (prebuilt)
        uses: actions/upload-artifact@v4
        with:
          name: gbs-elm-linux-manylinux-cp${{ matrix.py }}
          if-no-files-found: error
          overwrite: true
          # 关键：上传目录 prebuilt（不要用 prebuilt/**）
          path: prebuilt

  assemble:
    needs: [build-macos-windows, build-linux-manylinux]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Merge prebuilt/
        shell: bash
        run: |
          set -eux
          rm -rf prebuilt
          mkdir -p prebuilt

          echo "=== downloaded artifacts tree ==="
          find _artifacts -maxdepth 3 -type f -print || true

          for d in _artifacts/*; do
            if [ -d "$d/prebuilt" ]; then
              echo "Merging: $d/prebuilt/"
              rsync -a "$d/prebuilt/" prebuilt/
            else
              echo "Merging (no prebuilt/ folder): $d/"
              rsync -a "$d/" prebuilt/
            fi
          done

          echo "=== merged prebuilt tree ==="
          find prebuilt -maxdepth 6 -type f -print || true

      - name: Create bundle zip
        shell: bash
        run: |
          rm -rf _bundle
          mkdir -p _bundle
          rsync -a . _bundle/ \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".vscode/" \
            --exclude "build/" \
            --exclude ".xmake/" \
            --exclude "**/.deps/" \
            --exclude "**/.objs/" \
            --exclude "**/.build_cache/" \
            --exclude "_artifacts/" \
            --exclude "_bundle/"
          cd _bundle
          zip -r ../GBS_ELM_bundle.zip .

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: GBS_ELM_bundle
          if-no-files-found: error
          overwrite: true
          path: GBS_ELM_bundle.zip
